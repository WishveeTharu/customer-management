# Server
server.port=8080
spring.application.name=customer-management

# MariaDB DataSource
spring.datasource.url=jdbc:mariadb://localhost:3307/customer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDB103Dialect
spring.jpa.open-in-view=false

# File Upload - support large Excel files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Bulk processing batch size
app.bulk.batch-size=1000


spring.jpa.open-in-view=true


# spring.mvc.async.request-timeout=3600000
server.connection-timeout=3600000
server.tomcat.connection-timeout=3600000

server.tomcat.max-swallow-size=-1
spring.mvc.async.request-timeout=-1